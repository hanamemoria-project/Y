<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Hana Memoria</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #fdfbf7; --card-bg: #ffffff; --text-main: #2d3436; --text-muted: #636e72; --accent-blue: #38bdf8; --soft-border: #f1ede4; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: var(--text-main); }
        
        #app-container { display: block; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 24px; color: var(--text-main); font-weight: 700; }
        .header p { color: var(--text-muted); font-size: 14px; margin-top: 5px; }

        .dashboard-top { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; }
        .chart-container { background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid var(--soft-border); flex: 1; min-width: 250px; display: flex; justify-content: center; align-items: center; }
        .stats-container { flex: 2; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid var(--soft-border); text-align: center; }
        .stat-card h3 { margin: 0; font-size: 11px; color: var(--text-muted); font-weight: 700; letter-spacing: 0.5px; }
        .stat-card .angka { font-size: 32px; font-weight: 700; margin: 10px 0 0; color: var(--text-main); }

        .table-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .action-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .filter-box { padding: 10px 15px; border-radius: 10px; border: 1px solid #e2e8f0; background: white; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; outline: none; }
        
        .table-container { background: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid var(--soft-border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th, td { padding: 16px 20px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        th { color: var(--text-muted); font-weight: 600; background-color: #fafafa; }
        
        .deadline-normal { color: var(--text-muted); font-size: 12px; }
        .deadline-warning { color: var(--danger); font-weight: 700; font-size: 12px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .select-status { padding: 6px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; outline: none; appearance: none; text-align: center; }
        .bg-pending { background: #fef3c7; color: #b45309; }
        .bg-paid { background: #e0e7ff; color: #4338ca; }
        .bg-proses { background: #e0f2fe; color: #0369a1; }
        .bg-selesai { background: #dcfce7; color: #15803d; }
        
        .badge-mindar { background: #fee2e2; color: #b91c1c; font-size: 11px; margin-top: 5px; display: inline-block; padding: 4px 8px; border-radius: 6px; }
        .aksi-container { display: flex; gap: 8px; flex-wrap: wrap;}
        .btn-detail { background: #f8fafc; border: 1px solid #e2e8f0; color: #475569; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12px; }
        .btn-wa { background: #dcfce7; border: 1px solid #22c55e; color: #15803d; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; font-size: 12px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: white; width: 90%; max-width: 500px; padding: 25px; border-radius: 20px; position: relative; max-height: 90vh; overflow-y: auto; }
        .info-group { margin-bottom: 15px; }
        .info-group label { display: block; font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 5px; }
        .info-group p { margin: 0; font-size: 14px; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #f1f5f9; }
        .media-links { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-media { padding: 10px; text-align: center; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 600; border: 1px solid #e2e8f0; color: #475569; background: #f8fafc; cursor: pointer; }
        .mindar-box { margin-top: 20px; background: #f0fdf4; padding: 15px; border-radius: 12px; border: 1px dashed #4ade80; }
        .btn-simpan-mindar { background: #22c55e; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-top: 10px; font-weight: 600; cursor: pointer; }

        /* PENGATURAN CETAK GRID (PALING STABIL UNTUK ANDROID) */
        .grid-cetak {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15mm 10mm;
            width: 100%;
        }
        .item-cetak {
            break-inside: avoid;
            page-break-inside: avoid;
        }

        @media print {
            body { margin: 0; padding: 0; background: white !important; }
            #app-container, .modal-overlay, .no-print { display: none !important; }
            #area-cetak { display: block !important; width: 100% !important; margin: 0 auto !important; padding: 0 !important; max-width: 210mm !important; }
            
            .grid-cetak {
                display: grid !important;
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 15mm 10mm !important;
            }
            @page { size: A4 portrait; margin: 10mm; }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="header">
            <h1>✨ Command Center</h1>
            <p>Hana Memoria Production Dashboard</p>
        </div>

        <div class="dashboard-top">
            <div class="chart-container"><canvas id="grafikStatus" width="200" height="200"></canvas></div>
            <div class="stats-container">
                <div class="stat-card"><h3>BELUM BAYAR</h3><div class="angka" id="count-pending">0</div></div>
                <div class="stat-card"><h3>SUDAH BAYAR</h3><div class="angka" id="count-paid">0</div></div>
                <div class="stat-card"><h3>DIPROSES</h3><div class="angka" id="count-proses">0</div></div>
                <div class="stat-card" style="border-bottom: 4px solid #ef4444;"><h3>BELUM MINDAR</h3><div class="angka" id="count-mindar">0</div></div>
                <div class="stat-card"><h3>SELESAI</h3><div class="angka" id="count-selesai">0</div></div>
            </div>
        </div>

        <div class="table-controls">
            <h3 style="margin: 0; font-size: 16px; color: var(--text-main);">Daftar Antrean</h3>
            <div class="action-group">
                <button id="btn-cetak-massal" onclick="cetakMassal()" class="btn-detail" style="background: #10b981; color: white; border:none; padding: 10px 15px; font-size: 14px;">🖨️ Cetak / Simpan PDF (A4)</button>
                <select id="filter-produk" class="filter-box" onchange="renderTabel()">
                    <option value="Semua">📦 Semua Produk</option>
                    <option value="Gantungan Kunci">🔑 Gantungan Kunci</option>
                    <option value="Figura">🖼️ Figura</option>
                    <option value="Frame 12 Bulan">📅 Frame 12 Bulan</option>
                </select>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40px;"><input type="checkbox" id="check-all" onchange="togglePilihSemua(this)"></th>
                        <th>ID Pesanan</th>
                        <th>Nama Pelanggan</th>
                        <th>Produk</th>
                        <th>Deadline</th>
                        <th>Status Produksi</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabel-pesanan">
                    <tr><td colspan="7" style="text-align:center; color:#999;">Memuat data kenangan... ✨</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="modal-detail" class="modal-overlay">
        <div class="modal-box">
            <button style="position:absolute; top:20px; right:20px; background:none; border:none; font-size:20px; cursor:pointer;" onclick="tutupDetail()">✖</button>
            <h2 id="modal-id">Detail Pesanan</h2>
            <div class="info-group"><label>Alamat Pengiriman</label><p id="modal-alamat">-</p></div>
            <div class="info-group"><label>Pesan / Ucapan Pelanggan</label><p id="modal-ucapan">-</p></div>
            <div class="media-links">
                <button onclick="downloadFoto()" id="btn-download-foto" class="btn-media">📥 Download Foto (Untuk MindAR)</button>
                <a href="#" id="btn-lihat-video" target="_blank" class="btn-media">🎬 Lihat Video R2</a>
            </div>
            <div class="mindar-box">
                <label style="font-size: 13px; color: #166534; font-weight: 700; display: block; margin-bottom: 5px;">🚀 Pintu Upload ke R2</label>
                <input type="file" id="file-mindar" accept=".mind, .txt" style="width:100%; margin-top:5px; background:white; padding:8px; border-radius:8px; border:1px solid #bbf7d0;">
                <button class="btn-simpan-mindar" id="btn-upload-mindar" onclick="uploadKeR2()">📤 Upload & Simpan Target</button>
            </div>
        </div>
    </div>

    <script>
        const BASE_AR_URL = 'https://hanamemoria-project.github.io/HMproject/'; 
        const CLOUDFLARE_WORKER_URL = 'https://hm-backend.hanamemoria.workers.dev/';
        const SUPABASE_URL = 'https://ujnuvlrdxzqtfppbhioo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqbnV2bHJkeHpxdGZwcGJoaW9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjU2OTYsImV4cCI6MjA5MDY0MTY5Nn0.slqPc8v7QZXxHzvMkOlXWAAYebX-sqUIiKZvA9DJkl0';

        let grafikVisual = null; 
        let dataPesananGlobal = [];
        let idPesananAktif = "";
        let linkFotoAktif = "";

        // Fungsi Utama Saat Halaman Dimuat
        document.addEventListener("DOMContentLoaded", () => {
            ambilDataPesanan();
            setInterval(ambilDataPesanan, 60000);
        });

        async function ambilDataPesanan() {
            try {
                const respon = await fetch(`${SUPABASE_URL}/rest/v1/Pesanan?order=created_at.desc`, { 
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } 
                });
                
                if (!respon.ok) throw new Error("Gagal terhubung ke database");
                
                dataPesananGlobal = await respon.json();
                renderTabel(); 
            } catch (error) { 
                console.error("Gagal load data:", error); 
            }
        }

        async function perbaruiStatus(id, statusBaru) {
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/Pesanan?id_pesanan=eq.${id}`, {
                    method: 'PATCH', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ status_pesanan: statusBaru })
                });
                ambilDataPesanan();
            } catch (err) {}
        }

        function togglePilihSemua(source) {
            document.querySelectorAll('.check-pesanan').forEach(cb => cb.checked = source.checked);
        }

        function renderTabel() {
            try {
                if (!Array.isArray(dataPesananGlobal)) return;
                
                const wadahTabel = document.getElementById('tabel-pesanan');
                wadahTabel.innerHTML = '';
                const filterTerpilih = document.getElementById('filter-produk').value;
                let jmlPending = 0, jmlPaid = 0, jmlProses = 0, jmlSelesai = 0, jmlBelumMindAR = 0;
                const skrg = new Date();

                dataPesananGlobal.forEach(pesanan => {
                    let statusAsli = pesanan.status_pesanan || 'pending_payment';
                    if (statusAsli === 'Pending') statusAsli = 'pending_payment';
                    if (statusAsli === 'Proses') statusAsli = 'processing';
                    if (statusAsli === 'Selesai') statusAsli = 'completed';

                    let belumMindAR = (!pesanan.link_target || pesanan.link_target.trim() === "");

                    if (statusAsli === 'pending_payment') jmlPending++;
                    else if (statusAsli === 'paid') jmlPaid++;
                    else if (statusAsli === 'processing') jmlProses++;
                    else if (statusAsli === 'completed') jmlSelesai++;
                    if (belumMindAR) jmlBelumMindAR++;

                    if (filterTerpilih !== "Semua" && pesanan.jenis_pesanan !== filterTerpilih) return;

                    const tglDibuat = new Date(pesanan.created_at);
                    const tglDeadline = new Date(tglDibuat);
                    tglDeadline.setDate(tglDeadline.getDate() + 3);
                    const sisaHari = Math.ceil((tglDeadline - skrg) / (1000 * 60 * 60 * 24));
                    
                    let teksDeadline = "", kelasDeadline = "deadline-normal";
                    if (statusAsli === 'completed') teksDeadline = "Selesai ✨";
                    else {
                        if (sisaHari < 0) teksDeadline = `TERLAMBAT ${Math.abs(sisaHari)} HARI`;
                        else if (sisaHari === 0) teksDeadline = "HARI INI!";
                        else if (sisaHari === 1) teksDeadline = "BESOK!";
                        else teksDeadline = `${sisaHari} Hari Lagi`;
                        if (sisaHari <= 1) kelasDeadline = "deadline-warning";
                    }

                    let warnaBadge = 'bg-pending', labelWA = '💬 Tagihan';
                    if (statusAsli === 'paid') { warnaBadge = 'bg-paid'; labelWA = '💬 Resi Lunas'; }
                    if (statusAsli === 'processing') { warnaBadge = 'bg-proses'; labelWA = '💬 Update'; }
                    if (statusAsli === 'completed') { warnaBadge = 'bg-selesai'; labelWA = '💬 Selesai'; }

                    const baris = document.createElement('tr');
                    baris.innerHTML = `
                        <td><input type="checkbox" class="check-pesanan" value="${pesanan.id_pesanan}"></td>
                        <td><strong>${pesanan.id_pesanan}</strong></td>
                        <td>${pesanan.nama_pelanggan || '-'}</td>
                        <td>${pesanan.jenis_pesanan || '-'} (Qty: ${pesanan.jumlah || 1})</td>
                        <td><span class="${kelasDeadline}">${teksDeadline}</span></td>
                        <td>
                            <select class="select-status ${warnaBadge}" onchange="perbaruiStatus('${pesanan.id_pesanan}', this.value)">
                                <option value="pending_payment" ${statusAsli === 'pending_payment' ? 'selected' : ''}>Pending Payment</option>
                                <option value="paid" ${statusAsli === 'paid' ? 'selected' : ''}>Paid</option>
                                <option value="processing" ${statusAsli === 'processing' ? 'selected' : ''}>Processing</option>
                                <option value="completed" ${statusAsli === 'completed' ? 'selected' : ''}>Completed</option>
                            </select>
                            ${belumMindAR ? '<br><span class="badge-mindar">⚠️ Belum MindAR</span>' : ''}
                        </td>
                        <td>
                            <div class="aksi-container">
                                <button class="btn-detail" onclick="bukaDetail('${pesanan.id_pesanan}')">Detail</button>
                                <a href="${getWaLink(pesanan, statusAsli)}" target="_blank" class="btn-wa">${labelWA}</a>
                                <button class="btn-detail" style="background: #fee2e2; color: #b91c1c; border-color: #f87171;" onclick="hapusPesanan('${pesanan.id_pesanan}')">Hapus</button>
                            </div>
                        </td>
                    `;
                    wadahTabel.appendChild(baris);
                });

                document.getElementById('count-pending').innerText = jmlPending;
                document.getElementById('count-paid').innerText = jmlPaid;
                document.getElementById('count-proses').innerText = jmlProses;
                document.getElementById('count-mindar').innerText = jmlBelumMindAR;
                document.getElementById('count-selesai').innerText = jmlSelesai;
                
                buatDiagram(jmlPending, jmlPaid, jmlProses, jmlSelesai, jmlBelumMindAR);
            } catch (err) {
                console.error("Gagal me-render tabel:", err);
            }
        }

        // ==========================================
        // KODE CETAK (DESAIN FINAL: MULTIPLY BERDASARKAN JUMLAH)
        // ==========================================
        async function cetakMassal() {
            const checkboxes = document.querySelectorAll('.check-pesanan:checked');
            if (checkboxes.length === 0) return alert("⚠️ Silakan centang minimal satu pesanan di tabel terlebih dahulu!");

            const btnCetak = document.getElementById('btn-cetak-massal');
            const teksLama = btnCetak.innerHTML;
            btnCetak.innerHTML = "⏳ Menyiapkan Dokumen...";
            btnCetak.disabled = true;

            // AMBIL LOGO BASE64 AGAR TIDAK DIBLOKIR BROWSER HP
            let logoBase64 = "https://pub-02d853231cff4efa92ee6754c646a898.r2.dev/Logo_HM.png"; 
            try {
                const resLogo = await fetch(logoBase64);
                const blobLogo = await resLogo.blob();
                logoBase64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blobLogo);
                });
            } catch(e) {}

            let printArea = document.getElementById('area-cetak');
            if (!printArea) {
                printArea = document.createElement('div');
                printArea.id = 'area-cetak';
                printArea.style.display = 'none'; 
                document.body.appendChild(printArea);
            }
            printArea.innerHTML = '';

            document.getElementById('app-container').style.display = 'none';
            printArea.style.display = 'block';

            const btnKembali = document.createElement('button');
            btnKembali.className = 'no-print';
            btnKembali.innerHTML = '⬅️ Selesai / Kembali ke Dashboard';
            btnKembali.style.cssText = 'background: #38bdf8; color: white; border: none; padding: 15px 20px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; max-width: 210mm; margin: 0 auto 20px auto; display: block; border-radius: 10px; font-family: Inter, sans-serif;';
            btnKembali.onclick = () => window.location.reload(); 
            printArea.appendChild(btnKembali);

            const gridContainer = document.createElement('div');
            gridContainer.className = 'grid-cetak';
            printArea.appendChild(gridContainer);

            for (const cb of checkboxes) {
                const id = cb.value;
                const p = dataPesananGlobal.find(x => x.id_pesanan === id);
                if (!p) continue;

                const linkAR = `${BASE_AR_URL}?id=${id}`;
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(linkAR)}&ecc=H`;
                
                // Ambil nilai jumlah pesanan (default ke 1 kalau kosong/error)
                const qty = parseInt(p.jumlah) || 1;

                // Looping pencetakan box sesuai jumlah pesanan
                for (let i = 0; i < qty; i++) {
                    const item = document.createElement('div');
                    item.className = 'item-cetak';

                    item.innerHTML = `
                        <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">

                            <img src="${p.link_foto}" style="width: 100%; height: auto; border-radius: 8px; border: 1px solid #e2e8f0; display: block; box-sizing: border-box;">
                            
                            <div style="position: relative; width: 100%; border: 1px dashed #94a3b8; border-radius: 8px; background-color: #fdfaf4; box-sizing: border-box; margin-top: 25px;">
                                
                                <div style="position: absolute; top: 14px; left: 8px; right: 8px; bottom: 8px; border: 2px solid #b88663; border-radius: 10px; z-index: 1;"></div>

                                <div style="position: absolute; top: 4px; left: 50%; transform: translateX(-50%); background: #fdfaf4; padding: 0 10px; z-index: 2;">
                                    <span style="font-family: 'Inter', sans-serif; font-weight: 800; font-size: 15px; color: #8a6a53; letter-spacing: 0.5px;">SCAN ME</span>
                                </div>

                                <img src="${p.link_foto}" style="width: 100%; height: auto; visibility: hidden; display: block; pointer-events: none; padding: 2px;">

                                <div style="position: absolute; top: 25px; left: 0; right: 0; bottom: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3;">
                                    
                                    <div style="position: relative; width: 75%; max-width: 140px; aspect-ratio: 1/1; background: white; padding: 5px; border-radius: 8px; box-shadow: inset 0 0 5px rgba(0,0,0,0.05);">
                                        <img src="${qrUrl}" crossorigin="anonymous" style="width: 100%; height: 100%; object-fit: contain; display: block;">
                                        
                                        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 25%; aspect-ratio: 1/1; background: white; border-radius: 4px; display: flex; justify-content: center; align-items: center; padding: 2px;">
                                            <img src="${logoBase64}" style="width: 100%; height: auto; display: block;">
                                        </div>
                                    </div>

                                    <div style="text-align: center; margin-top: 8px;">
                                        <p style="font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; color: #8a6a53; margin: 0;">Order ID: ${id}</p>
                                        <p style="font-family: 'Inter', sans-serif; font-size: 8px; color: #d8a07c; margin: 2px 0 0 0;">✨ Hana Memoria ✨</p>
                                    </div>
                                </div>

                            </div>
                        </div>
                    `;
                    gridContainer.appendChild(item);
                }
            }

            // Tunggu semua gambar termuat sempurna di HP
            const images = Array.from(gridContainer.querySelectorAll('img'));
            await Promise.all(images.map(img => new Promise(resolve => {
                if (img.complete) resolve();
                else { img.onload = resolve; img.onerror = resolve; }
            })));

            btnCetak.innerHTML = teksLama;
            btnCetak.disabled = false;

            // Beri jeda 1.5 Detik untuk memberi napas pada memori HP sebelum buka dialog print
            setTimeout(() => {
                window.print();
            }, 1500);
        }

        function getWaLink(pesanan, type) {
            let phone = pesanan.whatsapp || "";
            if (phone.startsWith('0')) phone = '62' + phone.substring(1);
            let alamat = `${pesanan.alamat_detail || ''}, ${pesanan.kecamatan || ''}, ${pesanan.kota || ''}`;
            let total = pesanan.total_harga ? pesanan.total_harga.toLocaleString('id-ID') : '0';
            let msg = "";
            if (type === 'pending_payment') msg = `Halo Kak 😊\nTerima kasih sudah memesan di Hanamemoria 🤍\n\n📦 ID Pesanan: ${pesanan.id_pesanan}\n🧸 Produk: ${pesanan.jenis_pesanan}\n📍 Alamat: ${alamat}\n💰 Total Tagihan: Rp${total}\n\nSilakan lakukan pembayaran ke:\n🏦 BCA: 807683252\na.n Nuzulul Laila Khoirul Alfia\n\nSetelah transfer, mohon kirim bukti pembayaran ya 📩`;
            else if (type === 'paid') msg = `Halo Kak 😊\nPembayaran untuk pesanan ${pesanan.id_pesanan} sudah kami terima 🤍\nEstimasi pengerjaan: ±3 hari kerja ✨`;
            else if (type === 'processing') msg = `Halo Kak 😊\nPesanan ${pesanan.id_pesanan} saat ini sedang dalam proses pengerjaan ✨`;
            else if (type === 'completed') msg = `Halo Kak 😊\nKabar baik! 🎉\nPesanan ${pesanan.id_pesanan} sudah selesai dan siap dikirim 🚚✨`;
            return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
        }

        function buatDiagram(pending, paid, proses, selesai, mindar) {
            try {
                if (typeof Chart === 'undefined') return;
                const ctx = document.getElementById('grafikStatus').getContext('2d');
                if (grafikVisual !== null) grafikVisual.destroy();
                grafikVisual = new Chart(ctx, {
                    type: 'doughnut',
                    data: { labels: ['Belum Bayar', 'Lunas', 'Diproses', 'Selesai', 'Belum MindAR'], datasets: [{ data: [pending, paid, proses, selesai, mindar], backgroundColor: ['#fcd34d', '#a78bfa', '#7dd3fc', '#86efac', '#fca5a5'], borderWidth: 0 }] },
                    options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } } }
                });
            } catch (e) {
                console.log("Grafik tertunda");
            }
        }

        function bukaDetail(id) {
            idPesananAktif = id;
            const p = dataPesananGlobal.find(x => x.id_pesanan === id);
            if (p) {
                document.getElementById('modal-id').innerText = `Detail: ${id}`;
                document.getElementById('modal-alamat').innerText = `${p.alamat_detail || ''}, ${p.kecamatan || ''}, ${p.kota || ''}`;
                document.getElementById('modal-ucapan').innerText = (p.slides && p.slides[1]) ? p.slides[1].b : "-";
                linkFotoAktif = p.link_foto;
                document.getElementById('btn-lihat-video').href = p.link_video;
                document.getElementById('modal-detail').style.display = 'flex';
            }
        }
        
        function tutupDetail() { document.getElementById('modal-detail').style.display = 'none'; }
        
        async function downloadFoto() { window.open(linkFotoAktif, '_blank'); }
        
        async function uploadKeR2() {
            const fileInput = document.getElementById('file-mindar');
            const file = fileInput.files[0];
            if (!file) return alert("Pilih file!");
            
            // Ubah teks tombol jadi loading
            const btnUpload = document.getElementById('btn-upload-mindar');
            const teksLama = btnUpload.innerHTML;
            btnUpload.innerHTML = "⏳ Mengupload...";
            btnUpload.disabled = true;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Data = e.target.result.split(',')[1];
                try {
                    const res = await fetch(CLOUDFLARE_WORKER_URL, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'UPLOAD_MINDAR', id_pesanan: idPesananAktif, file_base64: base64Data })
                    });
                    const resData = await res.json();
                    if (resData.success) {
                        alert("Berhasil mengupload target AR!");
                        perbaruiStatus(idPesananAktif, 'processing');
                        tutupDetail();
                    } else {
                        alert("Gagal: " + (resData.message || "Kesalahan tidak diketahui"));
                    }
                } catch (error) {
                    alert("Gagal menghubungi server!");
                } finally {
                    btnUpload.innerHTML = teksLama;
                    btnUpload.disabled = false;
                }
            };
            reader.readAsDataURL(file);
        }

        // FUNGSI MENGHAPUS PESANAN DARI DASHBOARD
        async function hapusPesanan(id) {
            const yakin = confirm(`Apakah kamu yakin ingin menghapus pesanan ${id}?\n\nMenghapus pesanan ini juga akan otomatis menghapus file foto dan video di Cloudflare R2.`);
            
            if (!yakin) return; 

            try {
                const respon = await fetch(`${SUPABASE_URL}/rest/v1/Pesanan?id_pesanan=eq.${id}`, {
                    method: 'DELETE',
                    headers: { 
                        'apikey': SUPABASE_KEY, 
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    }
                });

                if (!respon.ok) {
                    throw new Error("Gagal menghapus data. Periksa koneksi atau RLS Policy di Supabase.");
                }
                
                alert(`Pesanan ${id} berhasil dihapus!`);
                ambilDataPesanan(); 
                
            } catch (err) {
                console.error(err);
                alert("Terjadi kesalahan: " + err.message);
            }
        }
    </script>
